name: Monthly keepalive commit

on:
  schedule:
    - cron: "0 0 1 * *"   # monthly, UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  SOURCE_BRANCH: main
  KEEPALIVE_BRANCH: _github_keepalive_branch
  THRESHOLD_DAYS: 28   # Githut timeout - (Max day month + 1) = 60 - (31 + 1) = 28
  CI_WORKFLOW_FILE: .github/workflows/ci.yml

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v5
        with:
          ref: ${{ env.SOURCE_BRANCH }}
          fetch-depth: 1

      - name: Evaluate source branch age
        id: check
        shell: bash
        run: |
          LAST_COMMIT_TS=$(git log -1 --format=%ct)
          NOW_TS=$(date +%s)
          AGE_DAYS=$(( (NOW_TS - LAST_COMMIT_TS) / 86400 ))

          echo "Source branch: $SOURCE_BRANCH"
          echo "Last commit age: ${AGE_DAYS} days"
          echo "Threshold: ${THRESHOLD_DAYS} days"

          if [ "$AGE_DAYS" -gt "$THRESHOLD_DAYS" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare keepalive branch
        if: steps.check.outputs.stale == 'true'
        shell: bash
        run: |
          git fetch origin

          if git show-ref --verify --quiet refs/remotes/origin/$KEEPALIVE_BRANCH; then
            echo "Branch exists: $KEEPALIVE_BRANCH"
            git checkout -B $KEEPALIVE_BRANCH origin/$KEEPALIVE_BRANCH
          else
            echo "Branch does not exist. Creating: $KEEPALIVE_BRANCH"
            git checkout --orphan $KEEPALIVE_BRANCH
            git rm -rf . # Remove all file, so we have an emptu branch
          fi

      - name: Configure git identity
        if: steps.check.outputs.stale == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create empty keepalive commit
        if: steps.check.outputs.stale == 'true'
        run: |
          git commit --allow-empty -m "chore(keepalive): monthly heartbeat"

      - name: Push keepalive branch
        if: steps.check.outputs.stale == 'true'
        run: |
          git push origin $KEEPALIVE_BRANCH

  update-llvm-versions:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_BRANCH }}
          token: ${{ secrets.KEEPALIVE_WORKFLOW }}

      - name: Get latest stable LLVM major version
        id: llvm_latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Stable tags look like llvmorg-19.1.7; RCs look like llvmorg-20.1.0-rc3.
          LATEST_MAJOR=$(gh api \
            "repos/llvm/llvm-project/releases?per_page=50" \
            --jq '[
              .[].tag_name
              | select(test("^llvmorg-[0-9]+\\.[0-9]+\\.[0-9]+$"))
              | ltrimstr("llvmorg-")
              | split(".")[0]
              | tonumber
            ] | max')
 
          echo "Latest stable LLVM major version: $LATEST_MAJOR"
          echo "version=$LATEST_MAJOR" >> "$GITHUB_OUTPUT"
 
      - name: Get current LLVM versions from matrix
        id: current_versions
        uses: mikefarah/yq@master
        with:
          cmd: yq '.jobs.test-system-libclang.strategy.matrix."llvm-version"[]' "${{ env.CI_WORKFLOW_FILE }}"
 
      - name: Check if version is already tracked on main
        id: decision
        run: |
          LATEST=${{ steps.llvm_latest.outputs.version }}
 
          if echo "${{ steps.current_versions.outputs.result }}" | grep -qx "$LATEST"; then
            echo "LLVM $LATEST is already in the matrix on main — nothing to do."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "LLVM $LATEST is not tracked yet — will open a PR."
            echo "needed=true"  >> "$GITHUB_OUTPUT"
          fi
 
      - name: Update llvm-version matrix
        if: steps.decision.outputs.needed == 'true'
        uses: mikefarah/yq@master
        with:
          cmd: >-
            yq -i
            '.jobs.test-system-libclang.strategy.matrix."llvm-version" += ["${{ steps.llvm_latest.outputs.version }}"]'
            "${{ env.CI_WORKFLOW_FILE }}"
 
      - name: Commit, push and open PR
        if: steps.decision.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.KEEPALIVE_WORKFLOW }}

        run: |
          NEW_VERSION=${{ steps.llvm_latest.outputs.version }}
          BRANCH="ci/add-llvm-${NEW_VERSION}"
 
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
 
          git checkout -b "$BRANCH"
          git add "${{ env.CI_WORKFLOW_FILE }}"
          git commit -m "ci: add LLVM ${NEW_VERSION} to test matrix"
          git push --force-with-lease origin "$BRANCH"
 
          # gh exits non-zero if a PR already exists — suppress it
          gh pr create \
            --title "ci: add LLVM ${NEW_VERSION} to test matrix" \
            --body "LLVM **${NEW_VERSION}** has been released.
 
          This PR adds it to the \`llvm-version\` matrix in \`${{ env.CI_WORKFLOW_FILE }}\`.
 
          ---
          *Opened automatically by the monthly keepalive workflow.*" \
            --base "$SOURCE_BRANCH" \
            --head "$BRANCH" \
          || echo "PR already open for $BRANCH — skipping."
      

